name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_PB_URL: ${{ secrets.POCKETBASE_URL || '' }}

      - name: Install Capacitor iOS dependencies
        run: |
          npx cap sync ios
          cd ios/App && pod install
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build unsigned iOS app
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/CaisterPlayz.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package IPA
        working-directory: ios/App
        run: |
          # Find the .app bundle inside the archive
          APP_PATH=$(find build/CaisterPlayz.xcarchive/Products -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive"
            find build/CaisterPlayz.xcarchive -type d -maxdepth 4
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create Payload directory and copy .app into it
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          
          # Zip it up as an .ipa
          cd build
          zip -r CaisterPlayz.ipa Payload/
          
          echo "IPA created successfully!"
          ls -lh CaisterPlayz.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CaisterPlayz-iOS
          path: ios/App/build/CaisterPlayz.ipa
          retention-days: 30
