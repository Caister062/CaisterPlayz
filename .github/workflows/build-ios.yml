name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_PB_URL: ${{ secrets.POCKETBASE_URL }}

      - name: Sync Capacitor iOS
        run: |
          npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build unsigned iOS archive
        working-directory: ios/App
        run: |
          set -eo pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/CaisterPlayz.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean archive | xcpretty

      - name: Package IPA
        working-directory: ios/App
        run: |
          APP_PATH=$(find build/CaisterPlayz.xcarchive/Products/Applications -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive"
            find build/CaisterPlayz.xcarchive -type d
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/

          cd build
          /usr/bin/zip -r CaisterPlayz.ipa Payload

          if [ ! -f CaisterPlayz.ipa ]; then
            echo "ERROR: IPA not created"
            exit 1
          fi

          ls -lh CaisterPlayz.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CaisterPlayz-iOS
          path: ios/App/build/CaisterPlayz.ipa
          retention-days: 30
